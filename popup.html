<!DOCTYPE html>
<html lang="EN">
    <head>
        <meta charset="UTF-8">
        <title>To USD</title>
        <link rel="stylesheet" type="text/css" href="popup.css"/>
    </head>
    <body>
    <div class="app">
        <div class="card">
            <header class="header">
                <div class="badge">KZT → USD</div>
                <h1>Convert Price</h1>
                <p>Set the current exchange rate and convert all prices on the page.</p>
            </header>

            <div id="converterContent">
                <div class="field">
                    <div class="field-header">
                        <span>Current exchange rate</span>
                        <span id="rateStatus" class="status-text">Loading...</span>
                    </div>
                    <input id="rateInput" value="455" min="1" max="1000000" step="1" type="number">
                </div>

                <div class="toggle-field">
                    <span>Авто-конвертация цен</span>
                    <label class="switch">
                        <input type="checkbox" id="autoConvertToggle" checked>
                        <span class="slider"></span>
                    </label>
                </div>

                <div class="actions">
                    <button id="setBtn" class="btn primary">Convert</button>
                    <button id="resetBtn" class="btn ghost">Reset</button>
                </div>
            </div>

            <div id="warningContent" style="display: none;">
                <div class="warning-box">
                    <span class="warning-icon">⚠️</span>
                    <h3>Неподдерживаемый сайт</h3>
                    <p>Этот плагин работает только на страницах объявлений kolesa.kz.</p>
                </div>
            </div>

            <div class="footnote">Works on kolesa.kz listing pages.</div>
        </div>
        <script src="config.js"></script>
        <script src="popup.js"></script>
    </div>
    </body>
</html>
